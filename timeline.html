<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PunditLeague Pro — Timeline Slates</title>
<style>
:root {
  --bg-deep:#060913;--bg-card:#0e1322;--bg-card2:#111827;--bg-card3:#1a2035;
  --accent-sky:#38bdf8;--accent-green:#10b981;--accent-amber:#f59e0b;--accent-purple:#a855f7;--accent-red:#ef4444;
  --text-primary:#f0f4ff;--text-secondary:#94a3b8;--text-muted:#4b5563;
  --border-subtle:#1e2a3a;--border-mid:#2d3f55;
  --glow-sky:0 0 18px rgba(56,189,248,0.4);--glow-green:0 0 18px rgba(16,185,129,0.4);--glow-purple:0 0 18px rgba(168,85,247,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg-deep);}
::-webkit-scrollbar-thumb{background:#2d3f55;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent-sky);}

#topbar{background:linear-gradient(135deg,#0a0f1e,#0e1a2e,#0a0f1e);border-bottom:1px solid var(--border-subtle);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--accent-sky),var(--accent-purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;box-shadow:var(--glow-sky);}
.brand-name{font-size:16px;font-weight:800;}
.brand-sub{font-size:10px;color:var(--accent-sky);text-transform:uppercase;letter-spacing:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.stat-chip{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:8px;padding:5px 10px;display:flex;flex-direction:column;align-items:center;min-width:60px;}
.stat-chip .label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
.stat-chip .value{font-size:14px;font-weight:700;color:var(--accent-sky);}
.token-wallet{background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(245,158,11,0.08));border:1px solid rgba(168,85,247,0.3);border-radius:10px;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;}
.token-count{color:var(--accent-purple);font-size:14px;font-weight:800;}
.token-label{color:var(--text-muted);}

#date-filter-bar{background:var(--bg-deep);padding:10px 16px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--border-subtle);position:sticky;top:64px;z-index:90;}
.pill{background:var(--bg-card);border:1px solid var(--border-subtle);color:var(--text-secondary);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.pill:hover{border-color:var(--accent-sky);color:var(--text-primary);}
.pill.active{background:var(--accent-sky);border-color:var(--accent-sky);color:#000;font-weight:700;}

#action-row{background:var(--bg-deep);padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border-subtle);}
.btn-save{background:linear-gradient(135deg,var(--accent-green),#059669);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.btn-save:hover{transform:translateY(-1px);box-shadow:var(--glow-green);}
.btn-random{background:linear-gradient(135deg,#7c3aed,var(--accent-purple));color:white;border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:800;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
.btn-random:hover{transform:translateY(-1px);box-shadow:var(--glow-purple);}
.btn-reset{background:transparent;color:var(--text-muted);border:1px solid var(--border-mid);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-reset:hover{border-color:var(--accent-red);color:var(--accent-red);}

#content-area{padding:16px;max-width:1100px;margin:0 auto;padding-bottom:80px;}

.date-section{margin-bottom:28px;}
.date-section-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding:10px 14px;background:var(--bg-card);border-radius:10px;border-left:3px solid var(--accent-sky);}
.date-section-day{font-size:18px;font-weight:900;color:var(--text-primary);}
.date-section-sub{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.date-section-count{margin-left:auto;font-size:11px;color:var(--accent-sky);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.2);border-radius:6px;padding:3px 9px;font-weight:600;}
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}

.match-card{background:var(--bg-card);border-radius:12px;overflow:hidden;border:1px solid var(--border-subtle);transition:border-color 0.2s,box-shadow 0.2s;}
.match-card:hover{border-color:var(--border-mid);}
.match-card.ignited{border-color:var(--accent-purple);box-shadow:0 0 20px rgba(168,85,247,0.25);}
.match-card.saved{border-color:rgba(16,185,129,0.4);}
.card-top-border{height:4px;width:100%;display:flex;}
.card-top-border .t1-color,.card-top-border .t2-color{flex:1;}
.card-body{padding:12px 14px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-meta{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;}
.card-id{font-size:10px;color:var(--text-muted);background:var(--bg-card3);border-radius:4px;padding:2px 6px;}
.match-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.team-block{display:flex;align-items:center;gap:8px;flex:1;}
.team-block.right{flex-direction:row-reverse;text-align:right;}
.flag-shield{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:rgba(255,255,255,0.95);flex-shrink:0;text-shadow:0 1px 3px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.12);}
.team-name{font-size:13px;font-weight:700;color:var(--text-primary);}
.team-rank{font-size:10px;color:var(--text-muted);}
.score-block{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.score-input{width:44px;height:44px;background:var(--bg-card3);border:2px solid var(--border-mid);border-radius:8px;color:var(--text-primary);font-size:18px;font-weight:800;text-align:center;outline:none;transition:border-color 0.2s;-moz-appearance:textfield;}
.score-input::-webkit-inner-spin-button,.score-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.score-input:focus{border-color:var(--accent-sky);box-shadow:0 0 0 3px rgba(56,189,248,0.15);}
.score-sep{font-size:18px;font-weight:700;color:var(--text-muted);}
.consensus-bar-container{margin-top:8px;}
.consensus-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-bottom:3px;}
.consensus-track{height:4px;border-radius:2px;display:flex;overflow:hidden;}
.cons-t1{background:var(--accent-sky);}
.cons-draw{background:var(--accent-amber);}
.cons-t2{background:var(--accent-green);}
.card-actions{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
.btn-ignite{background:transparent;border:1px solid var(--border-mid);border-radius:6px;color:var(--text-muted);padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:4px;}
.btn-ignite:hover{border-color:var(--accent-amber);color:var(--accent-amber);}
.btn-ignite.active{border-color:var(--accent-amber);color:var(--accent-amber);background:rgba(245,158,11,0.1);}
.saved-badge{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:var(--accent-green);border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;display:none;align-items:center;gap:4px;}
.saved-badge.visible{display:flex;}
.multiplier-badge{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:var(--accent-purple);border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;}

.day-progress{display:flex;align-items:center;gap:8px;margin-top:8px;}
.day-progress-track{flex:1;height:4px;background:var(--border-subtle);border-radius:2px;}
.day-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-sky),var(--accent-green));border-radius:2px;transition:width 0.4s;}
.day-progress-label{font-size:10px;color:var(--text-muted);white-space:nowrap;}

#toast-container{position:fixed;top:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--bg-card);border-radius:10px;padding:10px 16px;font-size:12px;font-weight:600;color:var(--text-primary);border-left:3px solid var(--accent-green);box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:toast-in 0.3s ease,toast-out 0.3s ease 2.5s forwards;pointer-events:auto;max-width:300px;}
.toast.warn{border-left-color:var(--accent-amber);}
@keyframes toast-in{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
@keyframes toast-out{from{opacity:1;}to{opacity:0;pointer-events:none;}}

@media(max-width:768px){.topbar-right{display:none;}.score-input{width:38px;height:38px;font-size:16px;}.matches-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-brand">
    <div class="brand-logo">PL</div>
    <div>
      <div class="brand-name">PunditLeague <span style="color:var(--accent-sky)">Pro</span></div>
      <div class="brand-sub">Timeline Slates · 2026 FIFA World Cup</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="stat-chip"><span class="label">Saved</span><span class="value" id="stat-saved">0/72</span></div>
    <div class="token-wallet"><span>⚡</span><span class="token-count" id="token-count">3</span><span class="token-label">Ignite Tokens</span></div>
  </div>
</div>

<div id="date-filter-bar"></div>

<div id="action-row">
  <button class="btn-save" onclick="saveAll()">💾 Save All Visible Predictions</button>
  <button class="btn-random" onclick="randomizeAll()">🎲 Randomize All 72 Matches</button>
  <button class="btn-reset" onclick="resetAll()">🗑 Reset All</button>
</div>

<div id="content-area"></div>
<div id="toast-container"></div>

<script>

};
const TEAM_ABBR={'Mexico':'MEX','South Africa':'RSA','South Korea':'KOR','Czechia':'CZE','Canada':'CAN','Bosnia':'BIH','Qatar':'QAT','Switzerland':'SUI','Brazil':'BRA','Morocco':'MAR','Haiti':'HAI','Scotland':'SCO','United States':'USA','Paraguay':'PAR','Australia':'AUS','Türkiye':'TUR','Germany':'GER','Curaçao':'CUW','Ivory Coast':'CIV','Ecuador':'ECU','Netherlands':'NED','Japan':'JPN','Sweden':'SWE','Tunisia':'TUN','Belgium':'BEL','Egypt':'EGY','Iran':'IRN','New Zealand':'NZL','Spain':'ESP','Cabo Verde':'CPV','Saudi Arabia':'KSA','Uruguay':'URU','France':'FRA','Senegal':'SEN','Iraq':'IRQ','Norway':'NOR','Argentina':'ARG','Algeria':'ALG','Austria':'AUT','Jordan':'JOR','Portugal':'POR','DR Congo':'COD','Uzbekistan':'UZB','Colombia':'COL','England':'ENG','Croatia':'CRO','Ghana':'GHA','Panama':'PAN'};
const GROUP_MATCHES=[
  {id:1,group:'A',date:'Jun 11',t1:'Mexico',t2:'South Africa'},{id:2,group:'A',date:'Jun 11',t1:'South Korea',t2:'Czechia'},{id:3,group:'A',date:'Jun 15',t1:'Czechia',t2:'South Africa'},{id:4,group:'A',date:'Jun 15',t1:'Mexico',t2:'South Korea'},{id:5,group:'A',date:'Jun 19',t1:'Czechia',t2:'Mexico'},{id:6,group:'A',date:'Jun 19',t1:'South Africa',t2:'South Korea'},
  {id:7,group:'B',date:'Jun 11',t1:'Canada',t2:'Bosnia'},{id:8,group:'B',date:'Jun 12',t1:'Qatar',t2:'Switzerland'},{id:9,group:'B',date:'Jun 15',t1:'Switzerland',t2:'Bosnia'},{id:10,group:'B',date:'Jun 16',t1:'Canada',t2:'Qatar'},{id:11,group:'B',date:'Jun 20',t1:'Switzerland',t2:'Canada'},{id:12,group:'B',date:'Jun 20',t1:'Bosnia',t2:'Qatar'},
  {id:13,group:'C',date:'Jun 12',t1:'Brazil',t2:'Morocco'},{id:14,group:'C',date:'Jun 12',t1:'Haiti',t2:'Scotland'},{id:15,group:'C',date:'Jun 16',t1:'Brazil',t2:'Haiti'},{id:16,group:'C',date:'Jun 16',t1:'Scotland',t2:'Morocco'},{id:17,group:'C',date:'Jun 20',t1:'Scotland',t2:'Brazil'},{id:18,group:'C',date:'Jun 20',t1:'Morocco',t2:'Haiti'},
  {id:19,group:'D',date:'Jun 12',t1:'United States',t2:'Paraguay'},{id:20,group:'D',date:'Jun 13',t1:'Australia',t2:'Türkiye'},{id:21,group:'D',date:'Jun 16',t1:'Türkiye',t2:'Paraguay'},{id:22,group:'D',date:'Jun 17',t1:'United States',t2:'Australia'},{id:23,group:'D',date:'Jun 21',t1:'Türkiye',t2:'United States'},{id:24,group:'D',date:'Jun 21',t1:'Paraguay',t2:'Australia'},
  {id:25,group:'E',date:'Jun 13',t1:'Ivory Coast',t2:'Ecuador'},{id:26,group:'E',date:'Jun 13',t1:'Germany',t2:'Curaçao'},{id:27,group:'E',date:'Jun 17',t1:'Germany',t2:'Ivory Coast'},{id:28,group:'E',date:'Jun 17',t1:'Ecuador',t2:'Curaçao'},{id:29,group:'E',date:'Jun 21',t1:'Curaçao',t2:'Ivory Coast'},{id:30,group:'E',date:'Jun 21',t1:'Ecuador',t2:'Germany'},
  {id:31,group:'F',date:'Jun 13',t1:'Netherlands',t2:'Japan'},{id:32,group:'F',date:'Jun 14',t1:'Sweden',t2:'Tunisia'},{id:33,group:'F',date:'Jun 17',t1:'Netherlands',t2:'Sweden'},{id:34,group:'F',date:'Jun 18',t1:'Tunisia',t2:'Japan'},{id:35,group:'F',date:'Jun 22',t1:'Japan',t2:'Sweden'},{id:36,group:'F',date:'Jun 22',t1:'Tunisia',t2:'Netherlands'},
  {id:37,group:'G',date:'Jun 14',t1:'Iran',t2:'New Zealand'},{id:38,group:'G',date:'Jun 14',t1:'Belgium',t2:'Egypt'},{id:39,group:'G',date:'Jun 18',t1:'Belgium',t2:'Iran'},{id:40,group:'G',date:'Jun 18',t1:'New Zealand',t2:'Egypt'},{id:41,group:'G',date:'Jun 22',t1:'New Zealand',t2:'Belgium'},{id:42,group:'G',date:'Jun 22',t1:'Egypt',t2:'Iran'},
  {id:43,group:'H',date:'Jun 14',t1:'Saudi Arabia',t2:'Uruguay'},{id:44,group:'H',date:'Jun 14',t1:'Spain',t2:'Cabo Verde'},{id:45,group:'H',date:'Jun 18',t1:'Uruguay',t2:'Cabo Verde'},{id:46,group:'H',date:'Jun 19',t1:'Spain',t2:'Saudi Arabia'},{id:47,group:'H',date:'Jun 22',t1:'Cabo Verde',t2:'Saudi Arabia'},{id:48,group:'H',date:'Jun 23',t1:'Uruguay',t2:'Spain'},

];

const CONSENSUS_DATA={};
GROUP_MATCHES.forEach(m=>{const d=Math.floor(15+Math.random()*20),t=Math.max(10,Math.floor(Math.random()*(85-d)));CONSENSUS_DATA[m.id]={t1:t,draw:d,t2:Math.max(5,100-d-t)};});

const ALL_DATES=[...new Set(GROUP_MATCHES.map(m=>m.date))].sort((a,b)=>{ const months={'Jun':6,'Jul':7};const [ma,da]=a.split(' ');const [mb,db]=b.split(' ');return months[ma]*100+parseInt(da)-(months[mb]*100+parseInt(db)); });

let appState={scores:{},tokensLeft:5,ignitedMatches:[],savedMatches:[],activeDate:'All',points:0};

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d.scores) appState.scores=d.scores;
    if(typeof d.tokensLeft==='number') appState.tokensLeft=d.tokensLeft;
    if(d.ignitedMatches) appState.ignitedMatches=d.ignitedMatches;
    if(d.savedMatches) appState.savedMatches=d.savedMatches;
    if(typeof d.points==='number') appState.points=d.points;
  }catch(e){}
}

function saveState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    const existing=raw?JSON.parse(raw):{};
    existing.scores=appState.scores;
    existing.tokensLeft=appState.tokensLeft;
    existing.ignitedMatches=appState.ignitedMatches;
    existing.savedMatches=appState.savedMatches;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(existing));
  }catch(e){}
}

function showToast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type==='warn'?'warn':''}`;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{try{c.removeChild(t);}catch(e){}},3000);
}

function flagShield(name){
  if(!name) return `<div class="flag-shield" style="background:#1e293b;color:#fff">TBD</div>`;
  const c=TEAM_COLORS[name]||{bg:'#334155',text:'#fff'};
  const a=TEAM_ABBR[name]||name.substring(0,3).toUpperCase();
  return `<div class="flag-shield" style="background:${c.bg};color:${c.text}">${a}</div>`;
}

function renderMatchCard(m){
  const mid=m.id;
  const s=appState.scores[mid]||{g1:0,g2:0,saved:false,ignited:false};
  const c1=(TEAM_COLORS[m.t1]||{bg:'#334155'}).bg;
  const c2=(TEAM_COLORS[m.t2]||{bg:'#334155'}).bg;
  const cd=CONSENSUS_DATA[mid]||{t1:40,draw:20,t2:40};
  const a1=TEAM_ABBR[m.t1]||m.t1.substring(0,3).toUpperCase();
  const a2=TEAM_ABBR[m.t2]||m.t2.substring(0,3).toUpperCase();
  return `
  <div class="match-card${s.ignited?' ignited':''}${s.saved?' saved':''}" id="card-${mid}">
    <div class="card-top-border"><div class="t1-color" style="background:${c1}"></div><div class="t2-color" style="background:${c2}"></div></div>
    <div class="card-body">
      <div class="card-header"><span class="card-meta">Group ${m.group}</span><span class="card-id">#${mid}</span></div>
      <div class="match-row">
        <div class="team-block">${flagShield(m.t1)}<div><div class="team-name">${m.t1}</div><div class="team-rank">${a1}</div></div></div>
        <div class="score-block">
          <input type="number" min="0" class="score-input" id="s1-${mid}" value="${s.g1||0}" oninput="onScore(${mid})">
          <span class="score-sep">:</span>
          <input type="number" min="0" class="score-input" id="s2-${mid}" value="${s.g2||0}" oninput="onScore(${mid})">
        </div>
        <div class="team-block right"><div><div class="team-name">${m.t2}</div><div class="team-rank">${a2}</div></div>${flagShield(m.t2)}</div>
      </div>
      <div class="consensus-bar-container">
        <div class="consensus-labels"><span>${a1}: ${cd.t1}%</span><span>Draw: ${cd.draw}%</span><span>${a2}: ${cd.t2}%</span></div>
        <div class="consensus-track"><div class="cons-t1" style="width:${cd.t1}%"></div><div class="cons-draw" style="width:${cd.draw}%"></div><div class="cons-t2" style="width:${cd.t2}%"></div></div>
      </div>
      <div class="card-actions">
        <button class="btn-ignite${s.ignited?' active':''}" id="ignite-btn-${mid}" onclick="toggleIgnite(${mid})">⚡ Ignite</button>
        ${s.ignited?'<span class="multiplier-badge">⚡ IGNITED</span>':''}
        <div class="saved-badge${s.saved?' visible':''}" id="saved-badge-${mid}">✅ Saved</div>
      </div>
    </div>
  </div>`;
}

function onScore(mid){
  const g1=Math.max(0,parseInt(document.getElementById('s1-'+mid).value)||0);
  const g2=Math.max(0,parseInt(document.getElementById('s2-'+mid).value)||0);
  document.getElementById('s1-'+mid).value=g1;
  document.getElementById('s2-'+mid).value=g2;
  if(!appState.scores[mid]) appState.scores[mid]={g1:0,g2:0,saved:false,ignited:false};
  appState.scores[mid].g1=g1; appState.scores[mid].g2=g2;
  saveState();
}

function toggleIgnite(mid){
  if(!appState.scores[mid]) appState.scores[mid]={g1:0,g2:0,saved:false,ignited:false};
  if(!appState.scores[mid].ignited){
    if(appState.tokensLeft<=0){showToast('⚡ No Ignite Tokens left!','warn');return;}
    appState.tokensLeft--;
    appState.scores[mid].ignited=true;
    if(!appState.ignitedMatches.includes(mid)) appState.ignitedMatches.push(mid);
    document.getElementById('card-'+mid).classList.add('ignited');
    document.getElementById('ignite-btn-'+mid).classList.add('active');
    showToast('⚡ Ignite Multiplier activated!');
  }else{
    appState.tokensLeft++;
    appState.scores[mid].ignited=false;
    appState.ignitedMatches=appState.ignitedMatches.filter(i=>i!==mid);
    document.getElementById('card-'+mid).classList.remove('ignited');
    document.getElementById('ignite-btn-'+mid).classList.remove('active');
    showToast('Ignite deactivated.','warn');
  }
  document.getElementById('token-count').textContent=appState.tokensLeft;
  saveState();
}

function saveAll(){
  const visible=appState.activeDate==='All'?GROUP_MATCHES:GROUP_MATCHES.filter(m=>m.date===appState.activeDate);
  visible.forEach(m=>{
    const s1=document.getElementById('s1-'+m.id), s2=document.getElementById('s2-'+m.id);
    if(!s1||!s2) return;
    if(!appState.scores[m.id]) appState.scores[m.id]={g1:0,g2:0,saved:false,ignited:false};
    appState.scores[m.id].g1=parseInt(s1.value)||0;
    appState.scores[m.id].g2=parseInt(s2.value)||0;
    appState.scores[m.id].saved=true;
    if(!appState.savedMatches.includes(m.id)) appState.savedMatches.push(m.id);
    const badge=document.getElementById('saved-badge-'+m.id);
    if(badge) badge.classList.add('visible');
    const card=document.getElementById('card-'+m.id);
    if(card) card.classList.add('saved');
  });
  updateStatBar(); saveState();
  showToast(`✅ ${visible.length} predictions saved!`);
}

function randomizeAll(){
  GROUP_MATCHES.forEach(m=>{
    const g1=Math.floor(Math.random()*4),g2=Math.floor(Math.random()*3);
    appState.scores[m.id]={g1,g2,saved:true,ignited:appState.scores[m.id]?.ignited||false};
    if(!appState.savedMatches.includes(m.id)) appState.savedMatches.push(m.id);
  });
  saveState(); updateStatBar(); renderContent();
  showToast('🎲 All 72 matches randomized!');
}

function resetAll(){
  if(!confirm('Reset all timeline predictions?')) return;
  GROUP_MATCHES.forEach(m=>{delete appState.scores[m.id];});
  appState.savedMatches=appState.savedMatches.filter(i=>!GROUP_MATCHES.find(m=>m.id===i));
  saveState(); updateStatBar(); renderContent();
  showToast('🗑 All predictions reset.','warn');
}

function renderDateFilter(){
  const dates=['All',...ALL_DATES];
  document.getElementById('date-filter-bar').innerHTML=dates.map(d=>{
    const count=d==='All'?GROUP_MATCHES.filter(m=>appState.savedMatches.includes(m.id)).length:GROUP_MATCHES.filter(m=>m.date===d&&appState.savedMatches.includes(m.id)).length;
    const total=d==='All'?72:GROUP_MATCHES.filter(m=>m.date===d).length;
    return `<button class="pill${appState.activeDate===d?' active':''}" onclick="selectDate('${d}')">${d} <span style="font-size:9px">${count}/${total}</span></button>`;
  }).join('');
}

function selectDate(d){appState.activeDate=d;renderDateFilter();renderContent();}

function renderContent(){
  const dates=appState.activeDate==='All'?ALL_DATES:[appState.activeDate];
  const html=dates.map(date=>{
    const matches=GROUP_MATCHES.filter(m=>m.date===date);
    const saved=matches.filter(m=>appState.savedMatches.includes(m.id)).length;
    const pct=Math.round((saved/matches.length)*100);
    return `<div class="date-section">
      <div class="date-section-header">
        <div><div class="date-section-day">📅 ${date}</div><div class="date-section-sub">${matches.length} match${matches.length!==1?'es':''} · Groups ${[...new Set(matches.map(m=>m.group))].join(', ')}</div></div>
        <div class="date-section-count">${saved}/${matches.length} saved</div>
      </div>
      <div class="day-progress"><div class="day-progress-track"><div class="day-progress-fill" style="width:${pct}%"></div></div><div class="day-progress-label">${pct}%</div></div>
      <div class="matches-grid" style="margin-top:10px">${matches.map(m=>renderMatchCard(m)).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('content-area').innerHTML=html;
}

function updateStatBar(){
  const saved=GROUP_MATCHES.filter(m=>appState.savedMatches.includes(m.id)).length;
  document.getElementById('stat-saved').textContent=saved+'/72';
  document.getElementById('token-count').textContent=appState.tokensLeft;
  renderDateFilter();
}

function init(){
  loadState();
  renderDateFilter();
  renderContent();
  updateStatBar();
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
