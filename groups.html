<html lang="en">

<meta charset="UTF-8">

<style>
:root {
  --bg-deep: #060913;
  --bg-card: #0e1322;
  --bg-card2: #111827;
  --bg-card3: #1a2035;
  --accent-sky: #38bdf8;
  --accent-green: #10b981;
  --accent-amber: #f59e0b;
  --accent-purple: #a855f7;
  --accent-red: #ef4444;
  --text-primary: #f0f4ff;
  --text-secondary: #94a3b8;
  --text-muted: #4b5563;
  --border-subtle: #1e2a3a;
  --border-mid: #2d3f55;
  --glow-sky: 0 0 18px rgba(56,189,248,0.4);
  --glow-green: 0 0 18px rgba(16,185,129,0.4);
  --glow-purple: 0 0 18px rgba(168,85,247,0.4);
  --glow-amber: 0 0 18px rgba(245,158,11,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg-deep); color: var(--text-primary); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: #2d3f55; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-sky); }

#topbar {
  background: linear-gradient(135deg, #0a0f1e 0%, #0e1a2e 50%, #0a0f1e 100%);
  border-bottom: 1px solid var(--border-subtle);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; gap: 12px; flex-wrap: wrap;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent-sky), var(--accent-purple));
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: white; box-shadow: var(--glow-sky);
}
.brand-name { font-size: 16px; font-weight: 800; }
.brand-sub { font-size: 10px; color: var(--accent-sky); text-transform: uppercase; letter-spacing: 1px; }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.stat-chip { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 5px 10px; display: flex; flex-direction: column; align-items: center; min-width: 60px; }
.stat-chip .label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
.stat-chip .value { font-size: 14px; font-weight: 700; color: var(--accent-sky); }

#sub-pills {
  background: var(--bg-deep); padding: 10px 16px; display: flex; gap: 6px; overflow-x: auto;
  border-bottom: 1px solid var(--border-subtle); position: sticky; top: 64px; z-index: 90;
}
.pill {
  background: var(--bg-card); border: 1px solid var(--border-subtle); color: var(--text-secondary);
  border-radius: 20px; padding: 5px 14px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.pill:hover { border-color: var(--accent-sky); color: var(--text-primary); }
.pill.active { background: var(--accent-sky); border-color: var(--accent-sky); color: #000; font-weight: 700; }

#action-row {
  background: var(--bg-deep); padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap;
  align-items: center; border-bottom: 1px solid var(--border-subtle);
}
.btn-save { background: linear-gradient(135deg, var(--accent-green), #059669); color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.btn-save:hover { transform: translateY(-1px); box-shadow: var(--glow-green); }
.btn-random { background: linear-gradient(135deg, #7c3aed, var(--accent-purple)); color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.btn-random:hover { transform: translateY(-1px); box-shadow: var(--glow-purple); }
.btn-reset { background: transparent; color: var(--text-muted); border: 1px solid var(--border-mid); border-radius: 8px; padding: 9px 18px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-reset:hover { border-color: var(--accent-red); color: var(--accent-red); }

#content-area { padding: 16px; max-width: 900px; margin: 0 auto; padding-bottom: 80px; }

.match-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--border-subtle); transition: border-color 0.2s, box-shadow 0.2s; position: relative; }
.match-card:hover { border-color: var(--border-mid); }
.match-card.ignited { border-color: var(--accent-purple); box-shadow: 0 0 20px rgba(168,85,247,0.25), inset 0 0 40px rgba(168,85,247,0.05); }
.match-card.saved { border-color: rgba(16,185,129,0.4); }
.card-top-border { height: 4px; width: 100%; display: flex; }
.card-top-border .t1-color, .card-top-border .t2-color { flex: 1; }
.card-body { padding: 12px 14px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.card-meta { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
.card-id { font-size: 10px; color: var(--text-muted); background: var(--bg-card3); border-radius: 4px; padding: 2px 6px; }
.match-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.team-block { display: flex; align-items: center; gap: 8px; flex: 1; }
.team-block.right { flex-direction: row-reverse; text-align: right; }
.flag-shield { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 900; color: rgba(255,255,255,0.95); flex-shrink: 0; text-shadow: 0 1px 3px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.12); }
.team-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.team-rank { font-size: 10px; color: var(--text-muted); }
.score-block { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.score-input { width: 44px; height: 44px; background: var(--bg-card3); border: 2px solid var(--border-mid); border-radius: 8px; color: var(--text-primary); font-size: 18px; font-weight: 800; text-align: center; outline: none; transition: border-color 0.2s; -moz-appearance: textfield; }
.score-input::-webkit-inner-spin-button, .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.score-input:focus { border-color: var(--accent-sky); box-shadow: 0 0 0 3px rgba(56,189,248,0.15); }
.score-sep { font-size: 18px; font-weight: 700; color: var(--text-muted); }
.consensus-bar-container { margin-top: 8px; }
.consensus-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.consensus-track { height: 4px; border-radius: 2px; display: flex; overflow: hidden; }
.cons-t1 { background: var(--accent-sky); }
.cons-draw { background: var(--accent-amber); }
.cons-t2 { background: var(--accent-green); }
.card-actions { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.btn-ignite { background: transparent; border: 1px solid var(--border-mid); border-radius: 6px; color: var(--text-muted); padding: 4px 10px; font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
.btn-ignite:hover { border-color: var(--accent-amber); color: var(--accent-amber); }
.btn-ignite.active { border-color: var(--accent-amber); color: var(--accent-amber); background: rgba(245,158,11,0.1); }
.saved-badge { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--accent-green); border-radius: 6px; padding: 4px 10px; font-size: 10px; font-weight: 700; display: none; align-items: center; gap: 4px; }
.saved-badge.visible { display: flex; }
.multiplier-badge { background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: var(--accent-purple); border-radius: 6px; padding: 4px 10px; font-size: 10px; font-weight: 700; }
.token-wallet { background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(245,158,11,0.08)); border: 1px solid rgba(168,85,247,0.3); border-radius: 10px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; }
.token-count { color: var(--accent-purple); font-size: 14px; font-weight: 800; }
.token-label { color: var(--text-muted); }

.standings-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-subtle); overflow: hidden; margin-bottom: 12px; }
.standings-header { background: linear-gradient(135deg, #0d1a2e, #111827); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.standings-title { font-size: 12px; font-weight: 700; color: var(--accent-sky); text-transform: uppercase; letter-spacing: 1px; }
table.standings-table { width: 100%; border-collapse: collapse; font-size: 11px; }
table.standings-table th { background: var(--bg-card3); color: var(--text-muted); padding: 6px 10px; text-align: center; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-subtle); }
table.standings-table th:first-child { text-align: left; }
table.standings-table td { padding: 7px 10px; text-align: center; border-bottom: 1px solid rgba(30,42,58,0.5); color: var(--text-primary); }
table.standings-table td:first-child { text-align: left; }
table.standings-table tr:last-child td { border-bottom: none; }
.pos-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 5px; font-size: 10px; font-weight: 700; margin-right: 4px; }
.pos-1 { background: rgba(245,158,11,0.2); color: var(--accent-amber); }
.pos-2 { background: rgba(56,189,248,0.15); color: var(--accent-sky); }
.pos-3 { background: rgba(168,85,247,0.15); color: var(--accent-purple); }
.pos-4 { background: rgba(75,85,99,0.2); color: var(--text-muted); }
.pts-cell { font-weight: 800; color: var(--accent-sky); }
.knockout-advance-indicator { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
.adv-green { background: rgba(16,185,129,0.15); color: var(--accent-green); }
.adv-blue { background: rgba(56,189,248,0.15); color: var(--accent-sky); }
.adv-amber { background: rgba(245,158,11,0.15); color: var(--accent-amber); }

.group-header { font-size: 11px; font-weight: 700; color: var(--accent-sky); text-transform: uppercase; letter-spacing: 2px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); margin-bottom: 10px; }

#achievements-bar { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.achievement-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; white-space: nowrap; }
.achievement-chip { background: var(--bg-card3); border: 1px solid var(--border-mid); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 5px; opacity: 0.4; transition: all 0.4s; }
.achievement-chip.unlocked { opacity: 1; border-color: var(--accent-purple); color: var(--accent-purple); box-shadow: var(--glow-purple); background: rgba(168,85,247,0.1); animation: achieve-glow 2s infinite; }
@keyframes achieve-glow { 0%,100% { box-shadow: 0 0 10px rgba(168,85,247,0.3); } 50% { box-shadow: 0 0 25px rgba(168,85,247,0.7); } }

#toast-container { position: fixed; top: 80px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--bg-card); border-radius: 10px; padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--text-primary); border-left: 3px solid var(--accent-green); box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: toast-in 0.3s ease, toast-out 0.3s ease 2.5s forwards; pointer-events: auto; max-width: 300px; }
.toast.warn { border-left-color: var(--accent-amber); }
@keyframes toast-in { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toast-out { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }

@media (max-width: 768px) {
  .topbar-right { display: none; }
  .score-input { width: 38px; height: 38px; font-size: 16px; }
}
</style>
</head>

  {id:55,group:'J',date:'Jun 15',t1:'Argentina',t2:'Algeria'},{id:56,group:'J',date:'Jun 15',t1:'Austria',t2:'Jordan'},{id:57,group:'J',date:'Jun 19',t1:'Argentina',t2:'Austria'},{id:58,group:'J',date:'Jun 20',t1:'Jordan',t2:'Algeria'},{id:59,group:'J',date:'Jun 23',t1:'Algeria',t2:'Austria'},{id:60,group:'J',date:'Jun 24',t1:'Jordan',t2:'Argentina'},
  {id:61,group:'K',date:'Jun 15',t1:'Portugal',t2:'DR Congo'},{id:62,group:'K',date:'Jun 16',t1:'Uzbekistan',t2:'Colombia'},{id:63,group:'K',date:'Jun 20',t1:'Portugal',t2:'Uzbekistan'},{id:64,group:'K',date:'Jun 20',t1:'Colombia',t2:'DR Congo'},{id:65,group:'K',date:'Jun 24',t1:'Colombia',t2:'Portugal'},{id:66,group:'K',date:'Jun 24',t1:'DR Congo',t2:'Uzbekistan'},
  {id:67,group:'L',date:'Jun 16',t1:'Ghana',t2:'Panama'},{id:68,group:'L',date:'Jun 16',t1:'England',t2:'Croatia'},{id:69,group:'L',date:'Jun 20',t1:'England',t2:'Ghana'},{id:70,group:'L',date:'Jun 21',t1:'Panama',t2:'Croatia'},{id:71,group:'L',date:'Jun 24',t1:'Panama',t2:'England'},{id:72,group:'L',date:'Jun 25',t1:'Croatia',t2:'Ghana'},
];

const CONSENSUS_DATA = {};
GROUP_MATCHES.forEach(m => {
  const drawPct = Math.floor(15 + Math.random() * 20);
  const t1raw = Math.floor(Math.random() * (85 - drawPct));
  const t1Pct = Math.max(10, t1raw);
  const t2Pct = 100 - drawPct - t1Pct;
  CONSENSUS_DATA[m.id] = { t1: t1Pct, draw: drawPct, t2: Math.max(5, t2Pct) };
});

let appState = {
  scores: {}, groupStandings: {}, groupWinners: {}, wildcards: [],
  tokensLeft: 3, ignitedMatches: [], savedMatches: [], activeGroupPill: 'A', points: 0
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.scores) appState.scores = d.scores;
    if (d.groupStandings) appState.groupStandings = d.groupStandings;
    if (d.groupWinners) appState.groupWinners = d.groupWinners;
    if (d.wildcards) appState.wildcards = d.wildcards;
    if (typeof d.tokensLeft === 'number') appState.tokensLeft = d.tokensLeft;
    if (d.ignitedMatches) appState.ignitedMatches = d.ignitedMatches;
    if (d.savedMatches) appState.savedMatches = d.savedMatches;
    if (d.activeGroupPill) appState.activeGroupPill = d.activeGroupPill;
    if (typeof d.points === 'number') appState.points = d.points;
  } catch(e) {}
}

function saveState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const existing = raw ? JSON.parse(raw) : {};
    existing.scores = appState.scores;
    existing.groupStandings = appState.groupStandings;
    existing.groupWinners = appState.groupWinners;
    existing.wildcards = appState.wildcards;
    existing.tokensLeft = appState.tokensLeft;
    existing.ignitedMatches = appState.ignitedMatches;
    existing.savedMatches = appState.savedMatches;
    existing.activeGroupPill = appState.activeGroupPill;
    existing.points = appState.points;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
  } catch(e) {}
}

function computeGroupStandings() {
  ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(g => {
    const teams = {};
    GROUP_MATCHES.filter(m=>m.group===g).forEach(m=>{
      [m.t1,m.t2].forEach(t=>{ if(!teams[t]) teams[t]={name:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
    });
    GROUP_MATCHES.filter(m=>m.group===g).forEach(m=>{
      const s=appState.scores[m.id];
      if(!s||!s.saved) return;
      const g1=parseInt(s.g1)||0, g2=parseInt(s.g2)||0;
      teams[m.t1].p++; teams[m.t2].p++;
      teams[m.t1].gf+=g1; teams[m.t1].ga+=g2; teams[m.t2].gf+=g2; teams[m.t2].ga+=g1;
      if(g1>g2){teams[m.t1].w++;teams[m.t1].pts+=3;teams[m.t2].l++;}
      else if(g1<g2){teams[m.t2].w++;teams[m.t2].pts+=3;teams[m.t1].l++;}
      else{teams[m.t1].d++;teams[m.t1].pts++;teams[m.t2].d++;teams[m.t2].pts++;}
    });
    const sorted=Object.values(teams).sort((a,b)=>{
      const gdA=a.gf-a.ga,gdB=b.gf-b.ga;
      if(b.pts!==a.pts) return b.pts-a.pts;
      if(gdB!==gdA) return gdB-gdA;
      return b.gf-a.gf;
    });
    appState.groupStandings[g]=sorted;
    appState.groupWinners[g]=sorted.map(t=>t.name);
  });
  computeWildcards();
}

function computeWildcards() {
  const thirds=[];
  ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(g=>{
    const s=appState.groupStandings[g];
    if(!s||s.length<3) return;
    const t=s[2];
    thirds.push({team:t.name,group:g,pts:t.pts,gd:t.gf-t.ga,gf:t.gf});
  });
  thirds.sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:b.gd!==a.gd?b.gd-a.gd:b.gf-a.gf);
  appState.wildcards=thirds.slice(0,8);
}

function showToast(msg, type='success') {
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${type==='warn'?'warn':''}`;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{ try{c.removeChild(t);}catch(e){} },3000);
}

function flagShield(name) {
  if(!name) return `<div class="flag-shield" style="background:#1e293b;color:#fff">TBD</div>`;
  const c=TEAM_COLORS[name]||{bg:'#334155',text:'#fff'};
  const a=TEAM_ABBR[name]||name.substring(0,3).toUpperCase();
  return `<div class="flag-shield" style="background:${c.bg};color:${c.text}">${a}</div>`;
}

function renderMatchCard(m) {
  const mid=m.id;
  const s=appState.scores[mid]||{g1:0,g2:0,saved:false,ignited:false};
  const c1=(TEAM_COLORS[m.t1]||{bg:'#334155'}).bg;
  const c2=(TEAM_COLORS[m.t2]||{bg:'#334155'}).bg;
  const cd=CONSENSUS_DATA[mid]||{t1:40,draw:20,t2:40};
  const a1=TEAM_ABBR[m.t1]||m.t1.substring(0,3).toUpperCase();
  const a2=TEAM_ABBR[m.t2]||m.t2.substring(0,3).toUpperCase();

  return `
  <div class="match-card${s.ignited?' ignited':''}${s.saved?' saved':''}" id="card-${mid}">
    <div class="card-top-border"><div class="t1-color" style="background:${c1}"></div><div class="t2-color" style="background:${c2}"></div></div>
    <div class="card-body">
      <div class="card-header">
        <span class="card-meta">${m.date} · Group ${m.group}</span>
        <span class="card-id">#${mid}</span>
      </div>
      <div class="match-row">
        <div class="team-block">${flagShield(m.t1)}<div><div class="team-name">${m.t1}</div><div class="team-rank">${a1}</div></div></div>
        <div class="score-block">
          <input type="number" min="0" class="score-input" id="s1-${mid}" value="${s.g1||0}" oninput="onScore(${mid})">
          <span class="score-sep">:</span>
          <input type="number" min="0" class="score-input" id="s2-${mid}" value="${s.g2||0}" oninput="onScore(${mid})">
        </div>
        <div class="team-block right"><div><div class="team-name">${m.t2}</div><div class="team-rank">${a2}</div></div>${flagShield(m.t2)}</div>
      </div>
      <div class="consensus-bar-container">
        <div class="consensus-labels"><span>${a1}: ${cd.t1}%</span><span>Draw: ${cd.draw}%</span><span>${a2}: ${cd.t2}%</span></div>
        <div class="consensus-track"><div class="cons-t1" style="width:${cd.t1}%"></div><div class="cons-draw" style="width:${cd.draw}%"></div><div class="cons-t2" style="width:${cd.t2}%"></div></div>
      </div>
      <div class="card-actions">
        <button class="btn-ignite${s.ignited?' active':''}" id="ignite-btn-${mid}" onclick="toggleIgnite(${mid})">⚡ Ignite</button>
        ${s.ignited?'<span class="multiplier-badge">⚡ IGNITED</span>':''}
        <div class="saved-badge${s.saved?' visible':''}" id="saved-badge-${mid}">✅ Saved</div>
      </div>
    </div>
  </div>`;
}

function onScore(mid) {
  const g1=Math.max(0,parseInt(document.getElementById('s1-'+mid).value)||0);
  const g2=Math.max(0,parseInt(document.getElementById('s2-'+mid).value)||0);
  document.getElementById('s1-'+mid).value=g1;
  document.getElementById('s2-'+mid).value=g2;
  if(!appState.scores[mid]) appState.scores[mid]={g1:0,g2:0,saved:false,ignited:false};
  appState.scores[mid].g1=g1; appState.scores[mid].g2=g2;
  saveState();
}

function toggleIgnite(mid) {
  if(!appState.scores[mid]) appState.scores[mid]={g1:0,g2:0,saved:false,ignited:false};
  if(!appState.scores[mid].ignited) {
    if(appState.tokensLeft<=0){showToast('⚡ No Ignite Tokens left!','warn');return;}
    appState.tokensLeft--;
    appState.scores[mid].ignited=true;
    if(!appState.ignitedMatches.includes(mid)) appState.ignitedMatches.push(mid);
    document.getElementById('card-'+mid).classList.add('ignited');
    document.getElementById('ignite-btn-'+mid).classList.add('active');
    showToast('⚡ Ignite Multiplier activated!');
  } else {
    appState.tokensLeft++;
    appState.scores[mid].ignited=false;
    appState.ignitedMatches=appState.ignitedMatches.filter(i=>i!==mid);
    document.getElementById('card-'+mid).classList.remove('ignited');
    document.getElementById('ignite-btn-'+mid).classList.remove('active');
    showToast('Ignite deactivated.','warn');
  }
  document.getElementById('token-count').textContent=appState.tokensLeft;
  updateAchievements(); saveState();
}

function saveCurrentGroup() {
  const g=appState.activeGroupPill;
  GROUP_MATCHES.filter(m=>m.group===g).forEach(m=>{
    const s1=document.getElementById('s1-'+m.id), s2=document.getElementById('s2-'+m.id);
    if(!s1||!s2) return;
    if(!appState.scores[m.id]) appState.scores[m.id]={g1:0,g2:0,saved:false,ignited:false};
    appState.scores[m.id].g1=parseInt(s1.value)||0;
    appState.scores[m.id].g2=parseInt(s2.value)||0;
    appState.scores[m.id].saved=true;
    if(!appState.savedMatches.includes(m.id)) appState.savedMatches.push(m.id);
    const badge=document.getElementById('saved-badge-'+m.id);
    if(badge) badge.classList.add('visible');
    const card=document.getElementById('card-'+m.id);
    if(card) card.classList.add('saved');
  });
  computeGroupStandings(); updateStatBar(); updateAchievements(); renderStandings(g); saveState();
  showToast(`✅ Group ${g} predictions saved!`);
}

function randomizeGroup() {
  const g=appState.activeGroupPill;
  GROUP_MATCHES.filter(m=>m.group===g).forEach(m=>{
    const g1=Math.floor(Math.random()*4), g2=Math.floor(Math.random()*3);
    appState.scores[m.id]={g1,g2,saved:true,ignited:appState.scores[m.id]?.ignited||false};
    if(!appState.savedMatches.includes(m.id)) appState.savedMatches.push(m.id);
  });
  computeGroupStandings(); updateStatBar(); updateAchievements(); saveState();
  renderGroupTab();
  showToast(`🎲 Group ${g} randomized!`);
}

function resetGroup() {
  const g=appState.activeGroupPill;
  if(!confirm(`Reset Group ${g} predictions?`)) return;
  GROUP_MATCHES.filter(m=>m.group===g).forEach(m=>{
    delete appState.scores[m.id];
    appState.savedMatches=appState.savedMatches.filter(i=>i!==m.id);
  });
  computeGroupStandings(); updateStatBar(); saveState(); renderGroupTab();
  showToast(`🗑 Group ${g} reset.`,'warn');
}

function renderStandings(g) {
  const el=document.getElementById('standings-'+g);
  if(!el) return;
  el.innerHTML=buildStandingsHTML(g);
}

function buildStandingsHTML(g) {
  const standings=appState.groupStandings[g];
  const teams=[...new Set(GROUP_MATCHES.filter(m=>m.group===g).flatMap(m=>[m.t1,m.t2]))];
  const rows=(standings||teams.map(t=>({name:t,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}))).map((t,i)=>{
    const gd=t.gf-t.ga, pos=i+1;
    const adv=pos===1?`<span class="knockout-advance-indicator adv-green">Q1</span>`:pos===2?`<span class="knockout-advance-indicator adv-blue">Q2</span>`:pos===3?`<span class="knockout-advance-indicator adv-amber">WC?</span>`:'';
    return `<tr><td><span class="pos-badge pos-${pos}">${pos}</span>${t.name}${adv}</td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td style="color:${gd>0?'var(--accent-green)':gd<0?'var(--accent-red)':'var(--text-muted)'}">${gd>0?'+':''}${gd}</td><td class="pts-cell">${t.pts}</td></tr>`;
  }).join('');
  return `<div class="standings-card">
    <div class="standings-header"><span class="standings-title">Group ${g} Standings</span>${(appState.groupWinners[g]&&appState.groupWinners[g][0])?`<span style="font-size:10px;color:var(--accent-green)">⚽ ${appState.groupWinners[g][0]} leads</span>`:''}</div>
    <table class="standings-table"><thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GD</th><th class="pts-cell">PTS</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function renderGroupTab() {
  const g=appState.activeGroupPill;
  const matches=GROUP_MATCHES.filter(m=>m.group===g);
  document.getElementById('groups-content').innerHTML=`
    <div>
      <div class="group-header">Group ${g}</div>
      <div id="standings-${g}">${buildStandingsHTML(g)}</div>
      <div style="margin-top:12px">${matches.map(m=>renderMatchCard(m)).join('')}</div>
    </div>`;
}

function renderSubPills() {
  const groups=['A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('sub-pills').innerHTML=groups.map(g=>{
    const saved=GROUP_MATCHES.filter(m=>m.group===g&&appState.savedMatches.includes(m.id)).length;
    return `<button class="pill${appState.activeGroupPill===g?' active':''}" onclick="selectGroup('${g}')">Group ${g} <span style="font-size:9px">${saved}/6</span></button>`;
  }).join('');
}

function selectGroup(g) {
  appState.activeGroupPill=g;
  saveState();
  renderSubPills();
  renderGroupTab();
}

function updateStatBar() {
  const groupSaved=GROUP_MATCHES.filter(m=>appState.savedMatches.includes(m.id)).length;
  document.getElementById('stat-saved').textContent=groupSaved+'/72';
  document.getElementById('stat-points').textContent=appState.points||0;
  document.getElementById('token-count').textContent=appState.tokensLeft;
}

function updateAchievements() {
  const groupSaved=GROUP_MATCHES.filter(m=>appState.savedMatches.includes(m.id)).length;
  if(groupSaved>=72) document.getElementById('ach-group').classList.add('unlocked');
  if(appState.ignitedMatches.length>=3) document.getElementById('ach-volt').classList.add('unlocked');
}

function init() {
  loadState();
  computeGroupStandings();
  renderSubPills();
  renderGroupTab();
  updateStatBar();
  updateAchievements();
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
